name: Publish to npm

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter @code-mri/shared-types build
      - run: pnpm --filter @code-mri/engine build

      - run: pnpm --filter @code-mri/engine test
      - run: pnpm --filter @code-mri/engine typecheck

      # Publishes every non-private package whose version is not yet on the
      # registry; workspace:* deps are rewritten to the real version by pnpm.
      - run: pnpm -r publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
